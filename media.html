    <style>
        /* PAGE SPECIFIC STYLES */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background-size: cover;
            background-position: center;
            height: 300px;
            background-color: var(--glass);
            filter: grayscale(1) contrast(1.2) brightness(0.7);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            border: 1px solid #222;
            cursor: pointer;
        }

        .gallery-item:hover {
            filter: grayscale(0) contrast(1.1) brightness(1);
            border: 1px solid var(--accent);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .gallery-item .label-overlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.6rem;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            z-index: 4;
        }

        .gallery-item:hover .label-overlay {
            opacity: 1;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .video-item {
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.5s;
        }

        .video-item:hover {
            border: 1px solid var(--accent);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.4);
        }

        .video-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.2) brightness(0.5);
            opacity: 0.5;
            transition: all 0.6s;
        }

        .video-item:hover video {
            filter: grayscale(0) contrast(1.1) brightness(0.8);
            opacity: 0.8;
        }

        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid var(--accent);
            font-size: 0.65rem;
            font-family: 'Roboto Mono', monospace;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        footer::before {
            content: '[ SYSTEM STATUS: ONLINE ]';
            display: block;
            margin-bottom: 20px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--steel);
            text-decoration: none;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            transition: all 0.3s;
            padding: 8px 15px;
            border: 1px solid transparent;
        }

        .social-links a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            nav {
                padding: 12px 15px;
            }

            .nav-links {
                gap: 10px;
            }

            .nav-links a {
                font-size: 0.5rem;
                padding: 6px 8px;
            }

            .hero {
                padding: 80px 20px 30px;
            }

            .hero-title {
                font-size: 1.8rem;
            }

            section {
                padding: 30px 20px;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
