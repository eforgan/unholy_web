<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | UNHOLY DEVOTION</title>
    
    <meta name="description" content="Contact UNHOLY DEVOTION. Booking, press, and general inquiries.">
    <meta name="keywords" content="UNHOLY, DEVOTION, contact, booking, press, email">
    <meta name="robots" content="index, follow">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Work+Sans:wght@200;400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #ff0000;
            --text: #E5E5E5;
            --steel: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', 'Roboto Mono', monospace;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9996;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9997;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 3px);
            opacity: 0.3;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.65rem;
            font-family: 'Syncopate', system-ui;
            transition: all 0.3s;
            letter-spacing: 0.15em;
            padding: 8px 12px;
            border: 1px solid transparent;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
            border: 1px solid var(--accent);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .hero {
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 50px 50px;
            text-align: center;
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        section {
            padding: 50px;
            max-width: 700px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 40px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--accent);
            display: inline-block;
        }

        .section-title::before { content: '// '; }

        .contact-terminal {
            background: linear-gradient(135deg, #0a0a0a 0%, #111 100%);
            border: 1px solid #333;
            padding: 40px;
            font-family: 'Roboto Mono', monospace;
            position: relative;
            width: 100%;
        }

        .terminal-header {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-dot.red { background: #ff5f56; }
        .terminal-dot.yellow { background: #ffbd2e; }
        .terminal-dot.green { background: #27c93f; }

        .terminal-title {
            color: var(--steel);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #222;
            color: var(--text);
            padding: 15px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.75rem;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: #444;
        }

        .contact-form textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 40px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            width: 100%;
        }

        .submit-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .contact-info {
            margin-top: 50px;
            text-align: center;
        }

        .contact-info h3 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .contact-email {
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px;
            transition: all 0.3s;
        }

        .contact-email:hover {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }

        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid var(--accent);
            font-size: 0.65rem;
            font-family: 'Roboto Mono', monospace;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        footer::before {
            content: '[ SYSTEM STATUS: ONLINE ]';
            display: block;
            margin-bottom: 20px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--steel);
            text-decoration: none;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            transition: all 0.3s;
            padding: 8px 15px;
            border: 1px solid transparent;
        }

        .social-links a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            nav { padding: 12px 15px; }
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.5rem; padding: 6px 8px; }
            .hero { padding: 80px 20px 30px; }
            .hero-title { font-size: 1.8rem; }
            section { padding: 30px 20px; }
            .contact-terminal { padding: 20px; }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="bio.html">Bio</a>
            <a href="media.html">Media</a>
            <a href="sets.html">Sets</a>
            <a href="tour.html">Tour</a>
            <a href="releases.html">Releases</a>
            <a href="merch.html">Merch</a>
            <a href="about.html">About</a>
            <a href="press.html">Press</a>
            <a href="blog/index.html">Blog</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1 class="hero-title">CONTACT</h1>
    </section>

    <section>
        <h2 class="section-title">TRANSMISSION</h2>
        
        <div class="contact-terminal">
            <div class="terminal-header">
                <div class="terminal-dot red"></div>
                <div class="terminal-dot yellow"></div>
                <div class="terminal-dot green"></div>
                <span class="terminal-title">send_message.exe</span>
            </div>
            <form class="contact-form">
                <input type="text" placeholder="[ IDENTIFIER ]" required>
                <input type="email" placeholder="[ FREQUENCY ]" required>
                <textarea placeholder="[ TRANSMISSION CONTENT ]" required></textarea>
                <button type="submit" class="submit-btn">Initiate Transfer</button>
            </form>
        </div>

        <div class="contact-info">
            <h3>Direct Contact</h3>
            <a href="mailto:contact@unholydevotion.com" class="contact-email">contact@unholydevotion.com</a>
        </div>
    </section>

    <footer>
        <div class="social-links">
            <a href="https://instagram.com/unholydevotion" target="_blank">INSTAGRAM</a>
            <a href="https://twitter.com/unholydevotion" target="_blank">TWITTER</a>
            <a href="https://soundcloud.com/unholydevotion" target="_blank">SOUNDCLOUD</a>
            <a href="https://youtube.com/@unholydevotion" target="_blank">YOUTUBE</a>
            <a href="https://spotify.com/artist/unholydevotion" target="_blank">SPOTIFY</a>
        </div>
        <p>&copy; 2026 UNHOLY DEVOTION. ALL RIGHTS RESERVED.</p>
    </footer>
</body>
</html>
