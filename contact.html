<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | UNHOLY DEVOTION</title>

    <meta name="description" content="Contact UNHOLY DEVOTION. Booking, press, and general inquiries.">
    <meta name="keywords" content="UNHOLY, DEVOTION, contact, booking, press, email">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
        type="image/svg+xml">
    <link
        href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Syncopate:wght@400;700&family=Work+Sans:wght@200;400;600&family=Roboto+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="canonical" href="https://unholydevotion.com/contact.html">

    <style>
        /* PAGE SPECIFIC STYLES */
        .contact-terminal {
            background: linear-gradient(135deg, #0a0a0a 0%, #111 100%);
            border: 1px solid #333;
            padding: 40px;
            font-family: 'Roboto Mono', monospace;
            position: relative;
            width: 100%;
        }

        .terminal-header {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .terminal-dot.red {
            background: #ff5f56;
        }

        .terminal-dot.yellow {
            background: #ffbd2e;
        }

        .terminal-dot.green {
            background: #27c93f;
        }

        .terminal-title {
            color: var(--steel);
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #222;
            color: var(--text);
            padding: 15px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.75rem;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        .contact-form input::placeholder,
        .contact-form textarea::placeholder {
            color: #444;
        }

        .contact-form textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 40px;
            font-family: 'Pirata One', cursive;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            width: 100%;
        }

        .submit-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .contact-info {
            margin-top: 50px;
            text-align: center;
        }

        .contact-info h3 {
            font-family: 'Pirata One', cursive;
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--accent);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .contact-email {
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 5px;
            transition: all 0.3s;
        }

        .contact-email:hover {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
        }

        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid var(--accent);
            font-size: 0.65rem;
            font-family: 'Roboto Mono', monospace;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        footer::before {
            content: '[ SYSTEM STATUS: ONLINE ]';
            display: block;
            margin-bottom: 20px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--steel);
            text-decoration: none;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            transition: all 0.3s;
            padding: 8px 15px;
            border: 1px solid transparent;
        }

        .social-links a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            nav {
                padding: 12px 15px;
            }

            .nav-links {
                gap: 10px;
            }

            .nav-links a {
                font-size: 0.5rem;
                padding: 6px 8px;
            }

            .hero {
                padding: 80px 20px 30px;
            }

            .hero-title {
                font-size: 1.8rem;
            }

            section {
                padding: 30px 20px;
            }

            .contact-terminal {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>

    <nav>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="bio.html">Bio</a>
            <a href="media.html">Media</a>
            <a href="sets.html">Sets</a>
            <a href="tour.html">Tour</a>
            <a href="releases.html">Releases</a>
            <a href="merch.html">Merch</a>
            <a href="about.html">About</a>
            <a href="press.html">Press</a>
            <a href="blog/index.html">Blog</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1 class="hero-title">CONTACT</h1>
    </section>

    <section>
        <h2 class="section-title">TRANSMISSION</h2>

        <div class="contact-terminal">
            <div class="terminal-header">
                <div class="terminal-dot red"></div>
                <div class="terminal-dot yellow"></div>
                <div class="terminal-dot green"></div>
                <span class="terminal-title">send_message.exe</span>
            </div>
            <form class="contact-form" id="contactForm">
                <input type="text" id="name" placeholder="[ IDENTIFIER ]" required>
                <input type="email" id="email" placeholder="[ FREQUENCY ]" required>
                <textarea id="message" placeholder="[ TRANSMISSION CONTENT ]" required></textarea>
                <button type="submit" class="submit-btn" id="submitBtn">Initiate Transfer</button>
            </form>
        </div>

        <div class="contact-info">
            <h3>Direct Contact</h3>
            <a href="mailto:contact@unholydevotion.com" class="contact-email">contact@unholydevotion.com</a>
        </div>
    </section>

    <script src="scripts/message-handler.js"></script>
    <script>
        const contactForm = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');

        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();

            submitBtn.textContent = 'INITIATING TRANSFER...';
            submitBtn.disabled = true;

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            // Use the global message handler
            setTimeout(() => {
                if (window.UNHOLY_MESSAGES) {
                    window.UNHOLY_MESSAGES.saveMessage(formData);
                }

                submitBtn.textContent = 'TRANSFER SUCCESSFUL';
                submitBtn.style.color = '#00ff41';
                submitBtn.style.borderColor = '#00ff41';

                setTimeout(() => {
                    contactForm.reset();
                    submitBtn.textContent = 'INITIATE TRANSFER';
                    submitBtn.style.color = 'var(--accent)';
                    submitBtn.style.borderColor = 'var(--accent)';
                    submitBtn.disabled = false;
                }, 3000);
            }, 1000);
        });
    </script>
    <audio id="bgAudio" src="TRACKS/Unholy Devotion - Dogma (Original Mix).mp3" loop></audio>
    <button id="audioToggle" class="audio-toggle" aria-label="Toggle Sound">
        <svg class="sound-on" viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg class="sound-off" viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    </button>
    <script src="global.js"></script>
</body>

</html>
