<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNHOLY DEVOTION - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-light: #111;
            --accent: #ff0000;
            --accent-glow: rgba(255, 0, 0, 0.3);
            --text: #E5E5E5;
            --steel: #888;
            --success: #00ff41;
            --warning: #ffbd2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
        }

        .admin-header {
            background: linear-gradient(to right, var(--bg), var(--bg-light));
            padding: 20px 40px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .admin-nav {
            display: flex;
            gap: 20px;
        }

        .admin-nav a {
            color: var(--steel);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }

        .admin-nav a:hover, .admin-nav a.active {
            color: var(--accent);
        }

        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: calc(100vh - 70px);
        }

        .sidebar {
            background: var(--bg-light);
            padding: 20px;
            border-right: 1px solid #222;
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-title {
            font-size: 0.65rem;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 15px;
        }

        .filter-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #222;
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            margin-bottom: 5px;
            text-align: left;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn .count {
            float: right;
            color: var(--steel);
        }

        .main-content {
            padding: 30px;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-light);
            border: 1px solid #222;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-family: 'Syncopate', sans-serif;
            font-size: 2rem;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-card {
            background: var(--bg-light);
            border: 1px solid #222;
            padding: 20px;
            transition: all 0.3s;
        }

        .message-card:hover {
            border-color: #333;
        }

        .message-card.unread {
            border-left: 3px solid var(--accent);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .message-from {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
        }

        .message-date {
            font-size: 0.6rem;
            color: var(--steel);
        }

        .message-email {
            font-size: 0.7rem;
            color: var(--steel);
            margin-bottom: 10px;
        }

        .message-preview {
            font-size: 0.75rem;
            color: var(--text);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .message-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.6rem;
            padding: 4px 10px;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .tag.press { border-color: #9b59b6; color: #9b59b6; }
        .tag.booking { border-color: #e74c3c; color: #e74c3c; }
        .tag.collab { border-color: #3498db; color: #3498db; }
        .tag.general { border-color: var(--steel); color: var(--steel); }
        .tag.bug { border-color: var(--warning); color: var(--warning; }

        .tag.priority-4 { border-color: #e74c3c; color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .tag.priority-3 { border-color: var(--warning); color: var(--warning); }
        .tag.priority-2 { border-color: var(--steel); color: var(--steel); }
        .tag.priority-1 { border-color: #27ae60; color: #27ae60; }

        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            padding: 8px 15px;
            background: transparent;
            border: 1px solid #333;
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .action-btn.reply {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--steel);
        }

        .empty-state h3 {
            font-family: 'Syncopate', sans-serif;
            margin-bottom: 10px;
        }

        @media (max-width: 1024px) {
            .admin-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <h1 class="admin-title">UNHOLY DEVOTION // ADMIN</h1>
        <nav class="admin-nav">
            <a href="#" class="active">Messages</a>
            <a href="#">Contacts</a>
            <a href="#">Analytics</a>
            <a href="#">Settings</a>
            <a href="../index.html">← Back to Site</a>
        </nav>
    </header>

    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Status</div>
                <button class="filter-btn active" data-filter="all">All <span class="count" id="count-all">0</span></button>
                <button class="filter-btn" data-filter="new">New <span class="count" id="count-new">0</span></button>
                <button class="filter-btn" data-filter="read">Read <span class="count" id="count-read">0</span></button>
                <button class="filter-btn" data-filter="replied">Replied <span class="count" id="count-replied">0</span></button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Category</div>
                <button class="filter-btn" data-category="press">Press</button>
                <button class="filter-btn" data-category="booking">Booking</button>
                <button class="filter-btn" data-category="collab">Collaboration</button>
                <button class="filter-btn" data-category="general">General</button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Actions</div>
                <button class="filter-btn" onclick="exportData()">Export JSON</button>
                <button class="filter-btn" onclick="exportData('csv')">Export CSV</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-number" id="stat-total">0</span>
                    <span class="stat-label">Total Messages</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-new">0</span>
                    <span class="stat-label">New</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-week">0</span>
                    <span class="stat-label">This Week</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="stat-contacts">0</span>
                    <span class="stat-label">Contacts</span>
                </div>
            </div>

            <div class="messages-list" id="messages-list">
                <!-- Messages will be loaded here -->
            </div>
        </main>
    </div>

    <script src="../scripts/message-handler.js"></script>
    <script>
        let currentFilter = { status: null, category: null };

        function loadMessages() {
            const messages = UNHOLY_MESSAGES.getMessages(currentFilter);
            const list = document.getElementById('messages-list');
            
            if (messages.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <h3>NO MESSAGES</h3>
                        <p>Messages from the website will appear here.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = messages.map(msg => `
                <div class="message-card ${msg.status === 'new' ? 'unread' : ''}" data-id="${msg.id}">
                    <div class="message-header">
                        <span class="message-from">${msg.name}</span>
                        <span class="message-date">${formatDate(msg.timestamp)}</span>
                    </div>
                    <div class="message-email">${msg.email}</div>
                    <p class="message-preview">${msg.message.substring(0, 150)}${msg.message.length > 150 ? '...' : ''}</p>
                    <div class="message-meta">
                        <span class="tag ${msg.category}">${msg.category}</span>
                        <span class="tag priority-${msg.priority}">Priority: ${msg.priority}</span>
                        ${msg.rating ? `<span class="tag">★ ${msg.rating}/5</span>` : ''}
                    </div>
                    <div class="message-actions">
                        <button class="action-btn" onclick="markAsRead('${msg.id}')">Mark Read</button>
                        <button class="action-btn" onclick="addNote('${msg.id}')">Add Note</button>
                        <button class="action-btn reply" onclick="replyTo('${msg.email}')">Reply</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const stats = UNHOLY_MESSAGES.getStats();
            
            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-new').textContent = stats.new;
            document.getElementById('stat-week').textContent = stats.thisWeek;
            document.getElementById('stat-contacts').textContent = stats.totalContacts;
            
            document.getElementById('count-all').textContent = stats.total;
            document.getElementById('count-new').textContent = stats.new;
            document.getElementById('count-read').textContent = stats.read;
            document.getElementById('count-replied').textContent = stats.replied;
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function markAsRead(id) {
            UNHOLY_MESSAGES.updateStatus(id, 'read');
            loadMessages();
            updateStats();
        }

        function addNote(id) {
            const note = prompt('Add a note:');
            if (note) {
                UNHOLY_MESSAGES.addNote(id, note);
                alert('Note added');
            }
        }

        function replyTo(email) {
            window.location.href = `mailto:${email}?subject=UNHOLY DEVOTION Response`;
        }

        function exportData(format = 'json') {
            const data = UNHOLY_MESSAGES.exportMessages(format);
            const blob = new Blob([data], { type: format === 'json' ? 'application/json' : 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `unholy_messages.${format}`;
            a.click();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filter = btn.dataset.filter;
                currentFilter.status = filter === 'all' ? null : filter;
                loadMessages();
            });
        });

        document.querySelectorAll('.filter-btn[data-category]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentFilter.category = btn.dataset.category;
                loadMessages();
            });
        });

        // Initialize
        loadMessages();
        updateStats();
    </script>
</body>
</html>
