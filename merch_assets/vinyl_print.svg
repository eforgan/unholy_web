<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#151515"/>
    </linearGradient>
    <radialGradient id="vinylGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="60%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </radialGradient>
    <radialGradient id="labelGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0505"/>
      <stop offset="100%" style="stop-color:#0a0000"/>
    </radialGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Vinyl record -->
  <circle cx="200" cy="200" r="160" fill="url(#vinylGrad)" stroke="#222" stroke-width="2"/>
  
  <!-- Vinyl grooves -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#151515" stroke-width="1"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#151515" stroke-width="1"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#151515" stroke-width="1"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#151515" stroke-width="1"/>
  
  <!-- Center label -->
  <circle cx="200" cy="200" r="50" fill="url(#labelGrad)" stroke="#ff0000" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="12" fill="#ff0000"/>
  <circle cx="200" cy="200" r="4" fill="#0a0000"/>
  
  <!-- Label text -->
  <text x="200" y="185" text-anchor="middle" font-family="Arial Black, sans-serif" 
        font-size="14" font-weight="bold" fill="#ff0000" 
        style="text-transform:uppercase; letter-spacing:2px;">UNHOLY</text>
  
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="8" fill="#888" style="letter-spacing:1px;">DEVOTION</text>
  
  <text x="200" y="215" text-anchor="middle" font-family="Courier New, monospace" 
        font-size="7" fill="#ff0000">VOL.1</text>
  
  <!-- Artwork lines -->
  <path d="M60 60 L340 340" stroke="#ff0000" stroke-width="0.5" opacity="0.2"/>
  <path d="M340 60 L60 340" stroke="#ff0000" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Abstract shapes -->
  <circle cx="80" cy="80" r="20" fill="none" stroke="#ff0000" stroke-width="0.5" opacity="0.3"/>
  <circle cx="320" cy="320" r="20" fill="none" stroke="#ff0000" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Edition info -->
  <text x="200" y="370" text-anchor="middle" font-family="Courier New, monospace" 
        font-size="10" fill="#ff0000" style="letter-spacing:1px;">SIGNED &amp; NUMBERED // #001/100</text>
  
  <!-- Corner brackets -->
  <path d="M30 30 L30 50 L50 30" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.5"/>
  <path d="M370 30 L370 50 L350 30" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.5"/>
  <path d="M30 370 L30 350 L50 370" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.5"/>
  <path d="M370 370 L370 350 L350 370" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.5"/>
  
  <!-- Glitch line -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="#ff0000" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="300" x2="400" y2="300" stroke="#ff0000" stroke-width="0.5" opacity="0.15"/>
</svg>