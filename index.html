<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNHOLY | Devotion & Chaos</title>
    
    <meta name="description" content="UNHOLY DEVOTION - Digital collective. Built on chaos, refined by precision. Industrial Techno">
    <meta name="keywords" content="UNHOLY, DEVOTION, techno, industrial, music, collective">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="UNHOLY | Devotion & Chaos">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" type="image/svg+xml">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Work+Sans:wght@200;400;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --accent: #ff0000;
            --text: #E5E5E5;
            --steel: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Work Sans', 'Roboto Mono', monospace;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9996;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9997;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 3px);
            opacity: 0.3;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.65rem;
            font-family: 'Syncopate', system-ui;
            transition: all 0.3s;
            letter-spacing: 0.15em;
            padding: 8px 12px;
            border: 1px solid transparent;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
            border: 1px solid var(--accent);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.1) brightness(0.9) contrast(1.05);
            z-index: -1;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0.3), var(--bg));
            z-index: 0;
        }

        .hero-vertical-text {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent);
            writing-mode: vertical-lr;
            text-orientation: mixed;
            white-space: nowrap;
            animation: laserGlow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000;
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s;
        }

        @keyframes laserGlow {
            0% { 
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
                filter: brightness(1);
            }
            50% { 
                text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000, 0 0 120px #ff0000;
                filter: brightness(1.5);
            }
            100% { 
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
                filter: brightness(1);
            }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .hero-logo {
            width: 50%;
            max-width: 600px;
            height: auto;
            margin-bottom: 30px;
            animation: logoPulse 3s ease-in-out infinite alternate;
        }

        @keyframes logoPulse {
            0% { filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.4)); }
            100% { filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.8)); }
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 4vw;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5), 0 0 60px rgba(255, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .hero-subtitle {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            color: var(--steel);
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .hero-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .hero-btn {
            padding: 15px 35px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.3s;
        }

        .hero-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--accent);
            font-size: 0.6rem;
            font-family: 'Roboto Mono', monospace;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            position: relative;
            z-index: 10;
        }

        footer::before {
            content: '[ SYSTEM STATUS: ONLINE ]';
            display: block;
            margin-bottom: 15px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--steel);
            text-decoration: none;
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            transition: all 0.3s;
            padding: 6px 12px;
            border: 1px solid transparent;
        }

        .social-links a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            nav { padding: 12px 15px; }
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.5rem; padding: 6px 8px; }
            .hero-title { font-size: 1.8rem; letter-spacing: 0.2em; }
            .hero-subtitle { font-size: 0.7rem; }
            .hero-btn { padding: 12px 25px; font-size: 0.6rem; }
            .hero-links { gap: 10px; }
        }
    </style>
</head>
