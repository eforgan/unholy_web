    <style>
        /* PAGE SPECIFIC STYLES */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.1) brightness(0.9) contrast(1.05);
            z-index: -1;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0.3), var(--bg));
            z-index: 0;
        }

        .hero-vertical-text {
            position: absolute;
            left: 30px;
            top: 35%;
            transform: translateY(-50%);
            font-family: 'Pirata One', cursive;
            font-size: 3vw;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent);
            writing-mode: vertical-lr;
            text-orientation: mixed;
            white-space: nowrap;
            animation: laserGlow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000;
            z-index: 10;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 2;
        }

        @media (max-width: 900px) {
            .hero-vertical-text {
                display: none;
            }
        }

        @keyframes laserGlow {
            0% {
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
                filter: brightness(1);
            }

            50% {
                text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000, 0 0 120px #ff0000;
                filter: brightness(1.5);
            }

            100% {
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
                filter: brightness(1);
            }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .hero-logo {
            width: 50%;
            max-width: 600px;
            height: auto;
            margin-bottom: 30px;
            animation: logoPulse 3s ease-in-out infinite alternate;
        }

        @keyframes logoPulse {
            0% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.4));
            }

            100% {
                filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.8));
            }
        }

        .hero-title {
            font-family: 'Pirata One', cursive;
            font-size: 6vw;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.5), 0 0 60px rgba(255, 0, 0, 0.3);
            margin-bottom: 20px;
            cursor: pointer;
        }

        .hero-subtitle {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            color: var(--steel);
            letter-spacing: 0.3em;
            text-transform: uppercase;
        }

        .hero-links {
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .hero-btn {
            padding: 15px 35px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.3s;
        }

        .hero-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--accent);
            font-size: 0.6rem;
            font-family: 'Roboto Mono', monospace;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            position: relative;
            z-index: 10;
        }

        footer::before {
            content: '[ SYSTEM STATUS: ONLINE ]';
            display: block;
            margin-bottom: 15px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--steel);
            text-decoration: none;
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            transition: all 0.3s;
            padding: 6px 12px;
            border: 1px solid transparent;
        }

        .social-links a:hover {
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.2);
        }

        .social-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            margin-right: 8px;
            vertical-align: middle;
        }

        @media (max-width: 768px) {
            nav {
                padding: 10px 20px;
                background: rgba(0, 0, 0, 0.5);
            }

            .hero-vertical-text {
                display: none;
                /* Already hidden at 900px, but extra safety */
            }

            .nav-links {
                gap: 10px;
            }

            .nav-links a {
                font-size: 0.5rem;
                padding: 6px 8px;
            }

            .hero-title {
                font-size: 1.8rem;
                letter-spacing: 0.2em;
            }

            .hero-subtitle {
                font-size: 0.7rem;
            }

            .hero-btn {
                padding: 12px 25px;
                font-size: 0.6rem;
            }

            .hero-links {
                gap: 10px;
            }
        }
    </style>
</head>
