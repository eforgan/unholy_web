<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="50%" style="stop-color:#151515"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Jacket body -->
  <path d="M100 100 L300 100 L320 150 L310 320 L290 360 L110 360 L90 320 L80 150 Z" 
        fill="url(#jacketGrad)" stroke="#ff0000" stroke-width="1"/>
  
  <!-- Zipper line -->
  <line x1="200" y1="100" x2="200" y2="360" stroke="#ff0000" stroke-width="2"/>
  
  <!-- Zipper teeth -->
  <line x1="195" y1="110" x2="195" y2="350" stroke="#ff0000" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="205" y1="110" x2="205" y2="350" stroke="#ff0000" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  
  <!-- Pockets -->
  <path d="M120 200 L180 200 L180 250 L120 250 Z" fill="none" stroke="#222" stroke-width="1"/>
  <path d="M220 200 L280 200 L280 250 L220 250 Z" fill="none" stroke="#222" stroke-width="1"/>
  
  <!-- UNHOLY text -->
  <text x="200" y="150" text-anchor="middle" font-family="Arial Black, sans-serif" 
        font-size="28" font-weight="bold" fill="#ff0000" 
        style="text-transform:uppercase; letter-spacing:6px;">UNHOLY</text>
  
  <!-- Tour 2026 badge -->
  <rect x="155" y="270" width="90" height="35" rx="3" fill="#ff0000"/>
  <text x="200" y="293" text-anchor="middle" font-family="Arial Black, sans-serif" 
        font-size="14" fill="#000" font-weight="bold" style="letter-spacing:2px;">TOUR 2026</text>
  
  <!-- Edition number -->
  <text x="200" y="340" text-anchor="middle" font-family="Courier New, monospace" 
        font-size="12" fill="#666">#001/050 // LIMITED EDITION</text>
  
  <!-- Collar -->
  <path d="M130 100 L170 80 L200 100 L230 80 L270 100" 
        fill="none" stroke="#ff0000" stroke-width="1" opacity="0.6"/>
  
  <!-- Hem line -->
  <line x1="90" y1="320" x2="310" y2="320" stroke="#ff0000" stroke-width="1" opacity="0.3"/>
  
  <!-- Sleeve hints -->
  <line x1="100" y1="150" x2="60" y2="200" stroke="#222" stroke-width="2"/>
  <line x1="300" y1="150" x2="340" y2="200" stroke="#222" stroke-width="2"/>
  
  <!-- Scanline effect -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#ff0000" stroke-width="0.5" opacity="0.1"/>
</svg>